
<html>
    <head>
        <title>:: Data Validation - Nishant Thummar :: </title>
        <style type="text/css">
            .dt-button{
                background: #e94e38;
                padding: 10px;
                color: #fff;
            }
            .form_error{
                outline: 0;
                border:1px solid red;
            }
            .form_valid{
                outline: 0;
                border:1px solid #ccc;
            }
        </style>
    </head>
    <body>
        <input type="text" placeholder="Enter Name" check_control="alpha"    />
        <input type="text" check_control="number"    />
        <input type="text" check_control="email"    /> 
        <hr />
        <table id="example">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Name</th>
                    <th>Age</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>nisahnt</td>
                    <td>23</td>
                </tr>
                <tr>
                    <td>1</td>
                    <td>nisahnt</td>
                    <td>23</td>
                </tr>
                <tr>
                    <td>1</td>
                    <td>nisahnt</td>
                    <td>23</td>
                </tr>
                <tr>
                    <td>1</td>
                    <td>nisahnt</td>
                    <td>23</td>
                </tr>
                <tr>
                    <td>1</td>
                    <td>nisahnt</td>
                    <td>23</td>
                </tr>
            </tbody> 
        </table>

        <!--data table start-->
        <script src="https://code.jquery.com/jquery-3.4.1.min.js" type="text/javascript"></script>
        <script src="https://cdn.datatables.net/1.10.16/js/jquery.dataTables.min.js" type="text/javascript"></script>
        <script src="https://cdn.datatables.net/buttons/1.5.1/js/dataTables.buttons.min.js" type="text/javascript"></script>
        <script src="https://cdn.datatables.net/buttons/1.5.1/js/buttons.flash.min.js" type="text/javascript"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.3/jszip.min.js" type="text/javascript"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.32/pdfmake.min.js" type="text/javascript"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.32/vfs_fonts.js" type="text/javascript"></script>
        <script src="https://cdn.datatables.net/buttons/1.5.1/js/buttons.html5.min.js" type="text/javascript"></script>
        <script src="https://cdn.datatables.net/buttons/1.5.1/js/buttons.print.min.js" type="text/javascript"></script>

        <script type="text/javascript">
            $(document).ready(function () {
                $('#example').DataTable({
                    dom: 'Bfrtip',
                    buttons: [
                        'copy', 'csv', 'excel', 'pdf', 'print'
                    ]
                });
            });
        </script>
        <!--data table end-->

        <!--validation start-->

        <script type="text/javascript">
            $("input[check_control]").keypress(function (e) {
                if ($(this).attr("check_control") == "alpha") {
                    var regex = new RegExp("^[a-zA-Z ]+$");
                } else if ($(this).attr("check_control") == "number") {
                    var regex = new RegExp("^[0-9]+$");
                } else {
                    var regex = new RegExp("^[a-zA-Z0-9.@_]+$");
                }

                var str = String.fromCharCode(!e.charCode ? e.which : e.charCode);
                if (regex.test(str)) {
                    $(this).removeClass("form_error").addClass("form_valid");
                    return true;
                } else {
                    $(this).removeClass("form_valid").addClass("form_error");
                }

                e.preventDefault();
                return false;
            });

            $("input[check_control]").blur(function () {

                var val = this.value;
                if (val == "") {
                    $(this).removeClass("form_valid").addClass("form_error").focus();
                } else {
                    $(this).removeClass("form_error").addClass("form_valid");
                }
            });
        </script>

        <!--validation end-->
    </body>
</html>
